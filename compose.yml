services:
  memories:
    image: pvvrzv/memories:latest
    restart: always
    build:
      context: ./
      tags:
        - pvvrzv/memories:latest
    volumes:
      - uploads:/app/uploads
    depends_on:
      - postgres
      - redis
    ports:
      - "3000:3000"

  postgres:
    image: postgres:17-alpine
    restart: always
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=Admin1234
      - POSTGRES_USER=admin
      - POSTGRES_DB=memories

  redis:
    image: redis:8-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - rdata:/data
    command: redis-server --save 60 1 --loglevel warning

  nginx:
    image: nginx:latest
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro # Shared cert folder
      - ./certbot/www:/var/www/certbot:ro # Shared challenge folder
    depends_on:
      - memories

volumes:
  rdata:
  uploads:
  pgdata:
